services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      POSTGRES_DB: ${POSTGRES_DB:-one_search}
      POSTGRES_USER: ${POSTGRES_USER:-one_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong postgres password}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set a strong encryption key of at least 32 characters}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-true}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_PATH: ${MCP_PATH:-/mcp}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080}
      HTTP_PROXY: ${ONE_SEARCH_HTTP_PROXY:-}
      HTTPS_PROXY: ${ONE_SEARCH_HTTPS_PROXY:-}
      ALL_PROXY: ${ONE_SEARCH_ALL_PROXY:-}
      NO_PROXY: ${ONE_SEARCH_NO_PROXY:-localhost,127.0.0.1,::1}
      http_proxy: ${ONE_SEARCH_HTTP_PROXY:-}
      https_proxy: ${ONE_SEARCH_HTTPS_PROXY:-}
      all_proxy: ${ONE_SEARCH_ALL_PROXY:-}
      no_proxy: ${ONE_SEARCH_NO_PROXY:-localhost,127.0.0.1,::1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5173:80"

volumes:
  postgres_data:
