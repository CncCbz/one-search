services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-one_search}
      POSTGRES_USER: ${POSTGRES_USER:-one_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-one_search}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-one_search} -d ${POSTGRES_DB:-one_search}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-one_search}:${POSTGRES_PASSWORD:-one_search}@postgres:5432/${POSTGRES_DB:-one_search}?sslmode=disable
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      MIGRATIONS_DIR: /app/backend/migrations
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-byte-encryption-key}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
